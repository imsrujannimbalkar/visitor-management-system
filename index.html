<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visitor Management System</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="Visitor Management System" />
    <meta name="description" content="A centralized record management system for secure visitor logging, documentation audit, and organizational oversight." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Visitor Management System" />
    <meta property="og:description" content="A centralized record management system for secure visitor logging, documentation audit, and organizational oversight." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Visitor Management System" />
    <meta property="twitter:description" content="A centralized record management system for secure visitor logging, documentation audit, and organizational oversight." />
    <meta property="twitter:image" content="/og-image.png" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="apple-touch-icon" href="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('SW registered:', reg);
          }).catch(err => {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
